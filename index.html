<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>舞蹈比對系統 (全螢幕純淨版)</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <style>
    :root {
        --primary: #00d4ff;
        --secondary: #ff0055;
        --bg-dark: #121212;
        --card-bg: rgba(255, 255, 255, 0.05);
    }

    body { 
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: var(--bg-dark); 
        color: #fff; margin: 0; padding: 0;
        display: flex; flex-direction: column; height: 100vh; overflow: hidden;
    }

    /* 頂部導航欄 */
    header {
        padding: 15px; background: rgba(0,0,0,0.5);
        backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    h1 { font-size: 1.1rem; margin: 0; color: var(--primary); letter-spacing: 1px; }

    /* 控制面板區 */
    .controls-panel {
        padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    }

    /* 分數顯示區 - 浮動儀表板 */
    .score-badge {
        font-size: 3rem; font-weight: 800; color: var(--primary);
        text-shadow: 0 0 20px rgba(0,212,255,0.5); margin: 10px 0;
    }

    /* 影片容器 - 並排設計 */
    .video-grid {
        flex: 1; display: flex; gap: 4px; padding: 4px; background: #000;
    }

    .video-wrapper {
        position: relative; flex: 1; border-radius: 12px; overflow: hidden;
        border: 1px solid rgba(255,255,255,0.15);
    }

    video, canvas { width: 100%; height: 100%; object-fit: cover; }

    /* 按鈕樣式優化 */
    .btn {
        border: none; border-radius: 8px; padding: 12px; font-weight: bold;
        transition: all 0.2s; font-size: 0.85rem; display: flex; align-items: center; justify-content: center;
    }
    .btn-primary { background: var(--primary); color: #000; }
    .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
    .btn:active { transform: scale(0.95); opacity: 0.8; }
    .btn:disabled { opacity: 0.3; }

    /* 狀態提示小點 */
    .status-dot {
        display: inline-block; width: 8px; height: 8px; background: #4CAF50;
        border-radius: 50%; margin-right: 5px; animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

    /* 進度條優化 */
    .progress-bar-container {
        position: fixed; top: 0; left: 0; width: 100%; height: 4px; z-index: 100; display: none;
    }
    #progressBar { height: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary)); width: 0%; transition: width 0.3s; }
</style>
</head>
<body>


    <!-- 浮動控制面板 -->
    <div class="progress-bar-container" id="progContainer">
        <div id="progressBar"></div>
    </div>

    <header>
        <h1>DANCE AI <small style="font-size: 0.6rem; color: #888;">BETA</small></h1>
    </header>

    <div class="controls-panel">
        <button class="btn btn-secondary" onclick="document.getElementById('upload1').click()">📁 載入教學</button>
        <button class="btn btn-secondary" id="flipBtn">🔄 切換鏡頭</button>
        <input type="file" id="upload1" accept="video/*" style="display: none;">
        
        <button class="btn btn-primary" id="startBtn" disabled style="grid-column: span 2;">⚡ 開始比對</button>
    </div>

    <div id="status" style="font-size: 0.75rem; color: #aaa;">請先選取範例影片</div>
    
    <div class="score-badge" id="result">0%</div>

    <div class="video-grid">
        <div class="video-wrapper">
            <span class="label-tag">MASTER</span>
            <video id="video1" muted playsinline></video>
            <canvas id="canvas1"></canvas>
        </div>
        <div class="video-wrapper">
            <span class="label-tag" id="cameraStatus">LIVE: 前鏡頭</span>
            <video id="video2" muted playsinline></video>
            <canvas id="canvas2"></canvas>
        </div>
    </div>
    <script>
        // ==========================================
        // 1. Log 系統設定
        // ==========================================
        const logHistory = [];
        function captureLog(type, args) {
            try {
                const msgArgs = Array.from(args).map(arg => typeof arg === 'object' ? JSON.stringify(arg) : arg).join(' ');
                logHistory.push(`[${new Date().toISOString()}] [${type}] ${msgArgs}`);
            } catch (e) {
                logHistory.push(`[${new Date().toISOString()}] [${type}] [Unserializable Output]`);
            }
        }
       
        const originalLog = console.log;
        const originalError = console.error;
        const originalWarn = console.warn;


        console.log = function() { originalLog.apply(console, arguments); captureLog('INFO', arguments); };
        console.error = function() { originalError.apply(console, arguments); captureLog('ERROR', arguments); };
        console.warn = function() { originalWarn.apply(console, arguments); captureLog('WARN', arguments); };


        function downloadLog() {
            const blob = new Blob([logHistory.join('\n')], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'dance_camera_log.txt';
            a.click();
            window.URL.revokeObjectURL(url);
        }


        // ==========================================
        // 2. 變數與 HTML 元素綁定
        // ==========================================
        const video1 = document.getElementById('video1');
        const video2 = document.getElementById('video2');
        const canvas1 = document.getElementById('canvas1');
        const canvas2 = document.getElementById('canvas2');
        const startBtn = document.getElementById('startBtn');
        const statusText = document.getElementById('status');
        const countdownText = document.getElementById('countdown');
       
        const box1 = document.getElementById('box1');
        const box2 = document.getElementById('box2');
        const uiPanel = document.getElementById('uiPanel');
        const mainTitle = document.getElementById('mainTitle');
        const controlsDiv = document.getElementById('controlsDiv');
       
        let sequence1 = [];
        let sequence2 = [];
        let currentCtx = null;
        let currentCanvas = null;
        let currentSequence = null;
        let isModelReady = false;
        let cameraStream = null;


        document.getElementById('upload1').addEventListener('change', (e) => loadVideo(e, video1));


        function loadVideo(event, videoElement) {
            const file = event.target.files[0];
            if (file) {
                videoElement.src = URL.createObjectURL(file);
                videoElement.onloadedmetadata = () => {
                    checkReady();
                };
            }
        }


        function checkReady() {
            if (video1.duration && isModelReady) {
                startBtn.disabled = false;
                startBtn.innerText = "開始準備錄影";
                statusText.innerText = "影片已就緒，點擊開始。";
            }
        }


        // ==========================================
        // 3. MediaPipe 初始化
        // ==========================================
        const pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
        pose.setOptions({
            modelComplexity: 1,
            smoothLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });


        pose.onResults((results) => {
            if (!currentCtx || !currentCanvas || !currentSequence) return;
           
            currentCtx.save();
            currentCtx.clearRect(0, 0, currentCanvas.width, currentCanvas.height);
           
            if (results.poseLandmarks) {
                drawConnectors(currentCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 4});
                drawLandmarks(currentCtx, results.poseLandmarks, {color: '#FF0000', lineWidth: 2});
               
                const normalized = normalizeLandmarks(results.poseLandmarks);
                if (normalized) currentSequence.push(normalized);
            }
            currentCtx.restore();
        });


        function normalizeLandmarks(landmarks) {
            if (!landmarks) return null;
            const centerX = (landmarks[23].x + landmarks[24].x) / 2;
            const centerY = (landmarks[23].y + landmarks[24].y) / 2;
            let normalizedArr = [];
            for (let i = 11; i <= 32; i++) {
                normalizedArr.push(landmarks[i].x - centerX);
                normalizedArr.push(landmarks[i].y - centerY);
            }
            return normalizedArr;
        }


        async function initModel() {
            try {
                await pose.initialize();
                isModelReady = true;
                startBtn.innerText = "等待上傳參考影片...";
                checkReady();
            } catch (error) {
                startBtn.innerText = "模型載入失敗，請重整";
            }
        }
        initModel();


        // ==========================================
        // 4. 參考影片解析 (離線/逐幀)
        // ==========================================
        async function processReferenceVideo() {
            return new Promise((resolve, reject) => {
                currentCanvas = canvas1;
                currentCtx = canvas1.getContext('2d');
                currentSequence = sequence1;
               
                canvas1.width = video1.videoWidth;
                canvas1.height = video1.videoHeight;
                video1.pause();
                video1.currentTime = 0;
               
                const frameDuration = 1 / 30; // 30 FPS


                video1.onseeked = async () => {
                    try {
                        if (video1.currentTime < video1.duration) {
                            await pose.send({ image: video1 });
                            video1.currentTime += frameDuration;
                        } else {
                            video1.onseeked = null;
                            resolve();
                        }
                    } catch (err) { reject(err); }
                };
                video1.currentTime = 0.001;
            });
        }


        // ==========================================
        // 5. 開啟相機與倒數計時
        // ==========================================
        async function startCamera() {
            try {
                cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video2.srcObject = cameraStream;
                return new Promise(resolve => {
                    video2.onloadedmetadata = () => {
                        canvas2.width = video2.videoWidth;
                        canvas2.height = video2.videoHeight;
                        resolve();
                    };
                });
            } catch (err) {
                throw new Error("無法存取相機權限");
            }
        }


        async function playCountdown() {
            countdownText.style.display = "block";
            for (let i = 5; i > 0; i--) {
                countdownText.innerText = i;
                await new Promise(r => setTimeout(r, 1000));
            }
            countdownText.innerText = "GO!";
            await new Promise(r => setTimeout(r, 500));
            countdownText.style.display = "none";
        }


        // ==========================================
        // 6. 主流程控制 (點擊開始按鈕)
        // ==========================================
        startBtn.addEventListener('click', async () => {
            startBtn.disabled = true;
            document.getElementById('result').innerText = "";
            sequence1 = [];
            sequence2 = [];


            // 隱藏不必要的 UI，保持畫面簡潔
            mainTitle.style.display = "none";
            controlsDiv.style.display = "none";
            uiPanel.style.background = "rgba(0, 0, 0, 0.3)"; // 變更透明度


            try {
                statusText.innerText = "正在分析教學影片...";
                await processReferenceVideo();


                // 切換畫面：隱藏參考影片，顯示滿版相機
                box1.style.display = "none";
                box2.style.display = "block";


                statusText.innerText = "正在開啟相機...";
                await startCamera();


                statusText.innerText = "請準備！";
                await playCountdown();


                statusText.innerText = "錄影中！(聽音樂跟著跳)";
                await recordAndCompare();


            } catch (err) {
                console.error("執行錯誤:", err);
                statusText.innerText = err.message;
            }
        });


        async function recordAndCompare() {
            return new Promise((resolve) => {
                currentCanvas = canvas2;
                currentCtx = canvas2.getContext('2d');
                currentSequence = sequence2;


                let isRecording = true;
               
                // 參考影片在背景播放 (以提供音樂節奏)
                video1.currentTime = 0;
                video1.play();


                video1.onended = () => {
                    isRecording = false;
                    video1.pause();
                    if(cameraStream) {
                        cameraStream.getTracks().forEach(track => track.stop());
                    }
                   
                    if(sequence2.length === 0) {
                        statusText.innerText = "未擷取到動作，請再試一次。";
                        resetUI();
                        resolve();
                        return;
                    }
                   
                    statusText.innerText = "計算中...";
                    calculateSimilarity();
                    resolve();
                };


                async function captureFrame() {
                    if (!isRecording) return;
                    try {
                        await pose.send({ image: video2 });
                    } catch (e) { console.error(e); }
                    requestAnimationFrame(captureFrame);
                }
                captureFrame();
            });
        }


        // 恢復 UI 顯示
        function resetUI() {
            mainTitle.style.display = "block";
            controlsDiv.style.display = "block";
            uiPanel.style.background = "rgba(0, 0, 0, 0.8)";
            startBtn.disabled = false;
            startBtn.innerText = "重新挑戰";
           
            // 如果你想在結束後切換回看參考影片，可以解開這兩行註解：
            // box1.style.display = "block";
            // box2.style.display = "none";
        }


        // ==========================================
        // 7. DTW 演算法與寬鬆評分系統
        // ==========================================
        function euclideanDistance(arr1, arr2) {
            let sum = 0;
            for (let i = 0; i < arr1.length; i++) sum += Math.pow(arr1[i] - arr2[i], 2);
            return Math.sqrt(sum);
        }


        function dtw(seq1, seq2) {
            const n = seq1.length;
            const m = seq2.length;
            let dp = Array(n + 1).fill().map(() => Array(m + 1).fill(Infinity));
            dp[0][0] = 0;


            for (let i = 1; i <= n; i++) {
                for (let j = 1; j <= m; j++) {
                    const cost = euclideanDistance(seq1[i - 1], seq2[j - 1]);
                    dp[i][j] = cost + Math.min( dp[i - 1][j], dp[i][j - 1], dp[i - 1][j - 1] );
                }
            }
            return dp[n][m];
        }


        function calculateSimilarity() {
            const distance = dtw(sequence1, sequence2);
            const maxFrames = Math.max(sequence1.length, sequence2.length);
            const avgErrorPerFrame = distance / maxFrames;


            // 寬鬆評分標準
            const baseError = Math.max(0, avgErrorPerFrame - 0.4);
            const threshold = 3.5;
           
            let score = 100 - (baseError / threshold * 100);
            score = Math.max(0, Math.min(100, score));


            statusText.innerText = "挑戰結束！";
            // 純淨版評分，無多餘評語
            document.getElementById('result').innerText = `你的得分: ${score.toFixed(0)} 分`;
           
            resetUI();
        }
    </script>
</body>
</html>
