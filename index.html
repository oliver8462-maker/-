<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 舞蹈比對 V3.2 - 穩定分析版</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <style>
        :root { --primary: #00f2fe; --success: #00ff88; --bg: #121212; }
        body { font-family: sans-serif; background: var(--bg); color: #fff; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { padding: 15px; background: #000; text-align: center; border-bottom: 1px solid #333; }
        .btn-group { display: flex; gap: 8px; margin-top: 10px; }
        button { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid var(--primary); background: none; color: white; font-weight: bold; font-size: 0.9rem; }
        #startBtn:disabled { opacity: 0.3; border-color: #555; }
        #startBtn { background: var(--primary); color: #000; }
        
        .main-display { flex: 1; display: flex; gap: 5px; padding: 5px; position: relative; }
        .video-container { position: relative; width: 50%; aspect-ratio: 9/16; background: #000; border-radius: 8px; overflow: hidden; }
        video, canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; }
        #video2, #canvas2 { transform: scaleX(-1); }

        .hud { position: absolute; bottom: 20px; width: 100%; text-align: center; pointer-events: none; }
        #result { font-size: 3.5rem; font-weight: 900; color: var(--primary); text-shadow: 0 0 20px #000; }
        
        #loading { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); display: none; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 9999; 
        }
        .progress-box { width: 80%; height: 10px; background: #333; border-radius: 5px; margin-top: 15px; overflow: hidden; }
        #progFill { width: 0%; height: 100%; background: var(--primary); transition: width 0.2s; }
    </style>
</head>
<body>

    <div id="loading">
        <div style="border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;"></div>
        <p id="loadingText" style="margin-top: 15px; font-weight: bold;">正在 AI 掃描動作...</p>
        <div class="progress-box"><div id="progFill"></div></div>
    </div>

    <div class="header">
        <div style="font-size: 1rem; letter-spacing: 1px;">DANCE AI 比對系統</div>
        <div class="btn-group">
            <button onclick="document.getElementById('upload1').click()">1. 讀取影片</button>
            <button id="startBtn" disabled>2. 開始比對</button>
        </div>
        <input type="file" id="upload1" accept="video/*" style="display: none;">
    </div>

    <div class="main-display">
        <div class="video-container">
            <video id="video1" muted playsinline></video>
            <canvas id="canvas1"></canvas>
        </div>
        <div class="video-container">
            <video id="video2" muted playsinline></video>
            <canvas id="canvas2"></canvas>
        </div>
    </div>

    <div class="hud">
        <div id="result">準備中</div>
        <div id="feedback" style="font-size: 0.8rem; color: #aaa;">請先上傳影片</div>
    </div>

    <script>
        const video1 = document.getElementById('video1');
        const video2 = document.getElementById('video2');
        const canvas1 = document.getElementById('canvas1');
        const canvas2 = document.getElementById('canvas2');
        const startBtn = document.getElementById('startBtn');
        const resultEl = document.getElementById('result');
        const progFill = document.getElementById('progFill');

        let sequence1 = []; 
        let livePose = null;
        let isAnalyzing = false;
        let camera = null;

        const pose = new Pose({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
        });

        // 使用 modelComplexity: 0 (Lite版) 確保手機跑得動
        pose.setOptions({ modelComplexity: 0, smoothLandmarks: true, minDetectionConfidence: 0.5 });

        // 接收 AI 結果
        pose.onResults((results) => {
            const cvs = isAnalyzing ? canvas1 : canvas2;
            const ctx = cvs.getContext('2d');
            ctx.clearRect(0, 0, cvs.width, cvs.height);
            if (results.poseLandmarks) {
                drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00f2fe', lineWidth: 2});
                const norm = normalize(results.poseLandmarks);
                if (isAnalyzing) window.lastExtractedPose = norm;
                else livePose = norm;
            }
        });

        function normalize(landmarks) {
            if (!landmarks) return null;
            const cx = (landmarks[11].x + landmarks[12].x) / 2;
            const cy = (landmarks[11].y + landmarks[12].y) / 2;
            const scale = Math.abs(landmarks[23].y - cy) || 0.1;
            let res = [];
            [11,12,13,14,15,16,23,24,25,26,27,28].forEach(i => {
                res.push((landmarks[i].x - cx) / scale, (landmarks[i].y - cy) / scale);
            });
            return res;
        }

        // 核心：穩定的影片分析函式
        document.getElementById('upload1').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // 1. 顯示載入中並停止相機
            document.getElementById('loading').style.display = 'flex';
            if (camera) await camera.stop(); 
            
            video1.src = URL.createObjectURL(file);
            video1.load();

            video1.onloadeddata = async () => {
                isAnalyzing = true;
                sequence1 = [];
                const fps = 5; // 每秒只分析 5 幀，減輕負擔
                const duration = video1.duration;
                const totalFrames = Math.floor(duration * fps);

                for (let i = 0; i < totalFrames; i++) {
                    const targetTime = i / fps;
                    video1.currentTime = targetTime;
                    
                    // 等待影格讀取完成
                    await new Promise(res => {
                        const timeout = setTimeout(res, 500); // 最多等 0.5 秒
                        video1.onseeked = () => { clearTimeout(timeout); res(); };
                    });

                    window.lastExtractedPose = null;
                    await pose.send({image: video1});
                    sequence1.push(window.lastExtractedPose);
                    
                    // 更新進度條
                    progFill.style.width = `${((i+1)/totalFrames)*100}%`;
                }

                isAnalyzing = false;
                document.getElementById('loading').style.display = 'none';
                startBtn.disabled = false;
                resultEl.innerText = "0%";
                document.getElementById('feedback').innerText = "分析完成，請站好並點擊開始";
                
                // 2. 分析完畢，重新啟動相機
                initCamera();
            };
        });

        function initCamera() {
            camera = new Camera(video2, {
                onFrame: async () => { if(!isAnalyzing) await pose.send({image: video2}); },
                width: 480, height: 640
            });
            camera.start();
        }

        startBtn.addEventListener('click', () => {
            video1.play();
            let scorePool = [];
            let lastUpdate = Date.now();

            function loop() {
                if (video1.paused || video1.ended) return;

                const idx = Math.floor(video1.currentTime * 5);
                const std = sequence1[idx];
                
                if (std && livePose) {
                    let diff = 0;
                    for(let i=0; i<std.length; i++) diff += Math.abs(std[i] - livePose[i]);
                    let s = Math.max(0, 100 - (diff * 20)); // 放寬評分
                    scorePool.push(s);
                }

                if (Date.now() - lastUpdate > 2000) {
                    if (scorePool.length > 0) {
                        const avg = scorePool.reduce((a,b)=>a+b)/scorePool.length;
                        resultEl.innerText = `${Math.round(avg)}%`;
                        resultEl.style.transform = "scale(1.2)";
                        setTimeout(()=>resultEl.style.transform="scale(1)", 200);
                        scorePool = [];
                    }
                    lastUpdate = Date.now();
                }
                requestAnimationFrame(loop);
            }
            loop();
        });

        pose.initialize().then(() => initCamera());
    </script>
    <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>
</body>
</html>
