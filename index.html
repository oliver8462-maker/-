<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>舞蹈比對系統 - 直播手機版 v2</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <style>
    body { 
        font-family: 'PingFang TC', 'Heiti TC', sans-serif; 
        background-color: #1a1a1a; 
        color: #fff; 
        margin: 0; 
        padding: 10px; /* 縮小邊距，留給影片空間 */
        text-align: center; 
    }
    h1 { font-size: 1.2rem; color: #00d4ff; margin: 10px 0; }
    .controls { background: #333; padding: 10px; border-radius: 10px; margin-bottom: 10px; }
    
    /* 核心修改：容器改為橫向排列（如果螢幕寬度夠），在手機上則維持上下 */
    .container { 
        display: flex; 
        flex-direction: row; /* 寬螢幕時左右放 */
        gap: 10px; 
        justify-content: center; 
        flex-wrap: wrap; /* 手機寬度不足時自動換行 */
    }

    .video-box { 
        position: relative; 
        border: 2px solid #444; 
        background: #000; 
        /* 針對直式優化：寬度設小，高度設長 */
        width: 45vw; 
        max-width: 300px; 
        aspect-ratio: 9 / 16; /* 強制設定為 9:16 直式比例 */
        overflow: hidden; 
        border-radius: 8px; 
    }

    video, canvas { 
        position: absolute; 
        top: 0; 
        left: 0; 
        width: 100%; 
        height: 100%; 
        object-fit: cover; /* 確保影片填滿直式方框 */
    }

    /* 手機直向持握時，讓影片變大一點 */
    @media (max-width: 480px) {
        .video-box {
            width: 46vw; /* 兩支影片並排 */
            height: auto;
        }
    }

    #video2, #canvas2 { transform: scaleX(-1); }
    
    button { 
        background: #00d4ff; border: none; padding: 10px; 
        font-size: 0.9rem; border-radius: 5px; cursor: pointer; 
        color: #000; font-weight: bold; width: 100%; margin-top: 5px; 
    }
    button:disabled { background: #555; cursor: not-allowed; }
    #flipBtn { background: #555; color: white; }
    #result { font-size: 2.5rem; font-weight: bold; margin: 10px 0; color: #ff4444; }
    #status { font-size: 0.8rem; color: #aaa; margin-bottom: 5px; }
    .progress-container { width: 100%; background-color: #444; border-radius: 10px; height: 8px; margin: 10px 0; display: none; }
    #progressBar { width: 0%; height: 100%; background-color: #00d4ff; border-radius: 10px; transition: width 0.3s; }
    .label-tag { position: absolute; top: 5px; left: 5px; background: rgba(0,0,0,0.6); padding: 2px 6px; font-size: 0.6rem; border-radius: 4px; z-index: 10; color: #00d4ff; }
</style>
</head>
<body>

    <h1>AI 舞蹈即時比對系統</h1>

    <div class="controls">
        <div id="status">步驟 1：請先選擇標準影片</div>
        <input type="file" id="upload1" accept="video/*" style="display: none;">
        <button onclick="document.getElementById('upload1').click()">選取標準影片</button>
        
        <button id="flipBtn">切換鏡頭</button>
        <span id="cameraStatus" style="margin-left: 10px; color: #00d4ff; font-weight: bold;">(目前：前鏡頭)</span>

        <div class="progress-container" id="progContainer">
            <div id="progressBar"></div>
        </div>
        
        <button id="startBtn" disabled>等待模型載入...</button>
    </div>

    <div id="result">--- %</div>

    <div class="container">
        <div class="video-box">
            <span class="label-tag">標準影片</span>
            <video id="video1" muted playsinline></video>
            <canvas id="canvas1"></canvas>
        </div>
        <div class="video-box">
            <span class="label-tag">你的鏡頭</span>
            <video id="video2" muted playsinline></video>
            <canvas id="canvas2"></canvas>
        </div>
    </div>

    <script>
        const video1 = document.getElementById('video1');
        const video2 = document.getElementById('video2');
        const canvas1 = document.getElementById('canvas1');
        const canvas2 = document.getElementById('canvas2');
        const startBtn = document.getElementById('startBtn');
        const flipBtn = document.getElementById('flipBtn');
        const cameraStatus = document.getElementById('cameraStatus');
        const statusText = document.getElementById('status');
        const progressBar = document.getElementById('progressBar');
        const progContainer = document.getElementById('progContainer');
        const resultEl = document.getElementById('result');

        let sequence1 = []; 
        let latestLivePose = null;
        let scoreHistory = [];
        let isAnalyzingStandard = false;
        let currentFramePose = null;
        let currentFacingMode = 'user'; 
        let isMirror = true;
        let camera = null;

        // 1. 初始化 MediaPipe
        const pose = new Pose({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
        });
        pose.setOptions({
            modelComplexity: 0, 
            smoothLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        pose.onResults((results) => {
            const canvas = (isAnalyzingStandard) ? canvas1 : canvas2;
            const ctx = canvas.getContext('2d');
            ctx.save();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (results.poseLandmarks) {
                drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00d4ff', lineWidth: 4});
                drawLandmarks(ctx, results.poseLandmarks, {color: '#ff0055', lineWidth: 2});
                
                const normalized = normalizeLandmarks(results.poseLandmarks, isMirror);
                if (isAnalyzingStandard) {
                    currentFramePose = normalized;
                } else {
                    latestLivePose = normalized;
                }
            }
            ctx.restore();
        });

        function normalizeLandmarks(landmarks, mirror) {
            if (!landmarks) return null;
            const centerX = (landmarks[23].x + landmarks[24].x) / 2;
            const centerY = (landmarks[23].y + landmarks[24].y) / 2;
            let arr = [];
            for (let i = 11; i <= 32; i++) {
                let x = landmarks[i].x - centerX;
                let y = landmarks[i].y - centerY;
                if (mirror) x = -x;
                arr.push(x, y);
            }
            return arr;
        }

        // 2. 啟動鏡頭函數
        async function startCamera() {
            if (camera) await camera.stop();
            camera = new Camera(video2, {
                onFrame: async () => {
                    if (!isAnalyzingStandard) await pose.send({image: video2});
                },
                width: 640,
                height: 480,
                facingMode: currentFacingMode
            });
            await camera.start();
        }

        flipBtn.addEventListener('click', async () => {
            currentFacingMode = (currentFacingMode === 'user') ? 'environment' : 'user';
            isMirror = (currentFacingMode === 'user');
            cameraStatus.innerText = (currentFacingMode === 'user') ? "(目前：前鏡頭)" : "(目前：後鏡頭)";
            cameraStatus.style.color = (currentFacingMode === 'user') ? "#00d4ff" : "#ffdd00";
            video2.style.transform = isMirror ? "scaleX(-1)" : "scaleX(1)";
            canvas2.style.transform = isMirror ? "scaleX(-1)" : "scaleX(1)";
            await startCamera();
        });

        // 3. 影片分析
        document.getElementById('upload1').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            video1.src = URL.createObjectURL(file);
            video1.onloadedmetadata = () => {
                statusText.innerText = "正在分析影片骨架，請稍候...";
                progContainer.style.display = 'block';
                analyzeStandardVideo();
            };
        });

        async function analyzeStandardVideo() {
            isAnalyzingStandard = true;
            sequence1 = [];
            video1.pause();
            const fps = 8; 
            const duration = video1.duration;
            const totalFrames = Math.floor(duration * fps);
            
            for (let i = 0; i < totalFrames; i++) {
                video1.currentTime = i / fps;
                await new Promise(r => {
                    const t = setTimeout(r, 1000);
                    video1.onseeked = () => { clearTimeout(t); r(); };
                });
                try {
                    await pose.send({image: video1});
                    sequence1.push(currentFramePose || []); 
                } catch (e) { sequence1.push([]); }
                progressBar.style.width = `${((i/totalFrames)*100).toFixed(0)}%`;
            }
            isAnalyzingStandard = false;
            statusText.innerText = "分析完成！可以開始跳舞了";
            startBtn.disabled = false;
            startBtn.innerText = "開始連動比對";
        }

        function euclideanDistance(a, b) {
            if (!a || !b || a.length !== b.length) return 999;
            let sum = 0;
            for (let i = 0; i < a.length; i++) sum += Math.pow(a[i] - b[i], 2);
            return Math.sqrt(sum);
        }

        function gameLoop() {
            if (video1.paused || video1.ended) return;
            const frameIdx = Math.floor(video1.currentTime * 8); // 配合分析的 FPS
            const standardPose = sequence1[frameIdx];
            if (standardPose && latestLivePose) {
                const dist = euclideanDistance(standardPose, latestLivePose);
                let score = Math.max(0, 100 - (dist / 1.2 * 100));
                scoreHistory.push(score);
                if (scoreHistory.length > 5) scoreHistory.shift();
                const avg = scoreHistory.reduce((a,b)=>a+b)/scoreHistory.length;
                resultEl.innerText = `${avg.toFixed(0)} %`;
                if (avg > 80) resultEl.style.color = "#00ff88";
                else if (avg > 50) resultEl.style.color = "#ffdd00";
                else resultEl.style.color = "#ff4444";
            }
            requestAnimationFrame(gameLoop);
        }

        startBtn.addEventListener('click', () => {
            video1.play();
            gameLoop();
            startBtn.disabled = true;
        });

        pose.initialize().then(() => {
            startBtn.innerText = "請先上傳影片";
            startCamera(); // 初始化啟動鏡頭
        });
    </script>
</body>
</html>
